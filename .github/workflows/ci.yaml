#-----------------------------
name: HTTP APP workflow

on:
  push:
    branches:
      - main

jobs:
  test_and_build:
    runs-on: ubuntu-latest

    steps:
      - name: clone code
        uses: actions/checkout@v5

      - name: set up node js environment
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: install node js packages
        run: npm install

      - name: compile source code
        run: npm run build

      - name: login to docker hub
        uses: docker/login-action@v3 # تحديث الـ v2 إلى v3 لضمان التوافق والأمان
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # إضافة خطوة الـ Set up Buildx لضمان تشغيل الـ build-push-action بدون مشاكل
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: build docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/http-app:${{ github.run_number }}
            ${{ secrets.DOCKER_USERNAME }}/http-app:latest

      - name: Clone Manifests Repository
        uses: actions/checkout@v4
        with:
          repository: MaZeNNaSSer22/Cd-Using-ArgoCD-Manifests-files-
          token: ${{ secrets.GITOPS_PAT }}
          path: manifests-repo

      - name: Update Image Tag in Deployment Manifest
        run: |
          cd manifests-repo
          sed -i 's|image: .*http-app:.*|image: ${{ secrets.DOCKER_USERNAME }}/http-app:${{ github.run_number }}|g' deploy.yaml

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
          cd manifests-repo

          # 1. إعداد بيانات الـ Git أولاً قبل عمل أي عمل شجرة الفروع (Branching)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 2. إنشاء الـ Branch الجديد والتحويل إليه
          BRANCH_NAME="update-image-${{ github.run_number }}"
          git checkout -b $BRANCH_NAME

          # 3. عمل الـ Add والـ Commit للتغيير
          git add deploy.yaml
          git commit -m "chore: update http-app image tag to build ${{ github.run_number }}"

          # 4. عمل الـ Push
          git push origin $BRANCH_NAME

          # 5. إنشاء الـ Pull Request
          gh pr create \
            --title "Deploy: Update http-app image to build ${{ github.run_number }}" \
            --body "This PR was automatically generated by GitHub Actions to update the application image version to ${{ github.run_number }}." \
            --base main \
            --head $BRANCH_NAME
